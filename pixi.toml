[workspace]
authors = ["Peter Rupnik <peter.rupnik@ijs.si>"]
channels = ["conda-forge", "bioconda"]
name = "aligning_videos"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
run = "snakemake -j 1 --rerun-incomplete"
dry = "snakemake -j 1 -n"
rulegraph = "snakemake --rulegraph | dot -Tpdf > rulegraph.pdf"
dag = "snakemake --dag | dot -Tpdf > dag.pdf"
clean = "rm -rf .pixi .snakemake data/final/"

[dependencies]
python = ">=3.14.5,<3.15"
scipy = ">=1.17.1,<2"
loguru = ">=0.7.3,<0.8"
tqdm = ">=4.68.2,<5"
numpy = ">=2.4.6,<3"
pydub = ">=0.25.1,<0.26"
moviepy = ">=1.0.3,<2"
ffmpeg = ">=8.1.1,<9"
matplotlib = ">=3.10.9,<4"
ipython = ">=9.14.1,<10"
jupyter = ">=1.1.1,<2"
lxml = ">=6.1.1,<7"

[pypi-dependencies]
soundfile = ">=0.14.0,<0.15"
snakemake = ">=9.0.0,<10"
exbee = { git = "https://github.com/5roop/exbee.git", subdirectory = "exbee", rev = "6991ff7" }

